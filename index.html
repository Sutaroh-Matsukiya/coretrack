<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CoreTrack | フィットネス事業本部</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📊</text></svg>">
<style>
  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background-color: #f3f4f6;
  }
  iframe {
    width: 100vw;
    height: 100vh;
    border: none;
    display: block;
  }
  #loading {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
    color: #6b7280;
    font-family: 'Segoe UI', 'Meiryo', sans-serif;
    z-index: -1;
  }
  #loading .spinner {
    width: 40px;
    height: 40px;
    border: 4px solid #e5e7eb;
    border-top-color: #3b82f6;
    border-radius: 50%;
    animation: spin 1s linear infinite;
    margin: 0 auto 12px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
  <div id="loading">
    <div class="spinner"></div>
    <div>CoreTrack を読み込み中...</div>
  </div>
  <iframe
    src="https://script.google.com/macros/s/AKfycbz08kBVZOVljbamTqQPGp7dxYtjGTidtv-9VmsBVRTnV2PDMBJawg1O7dKLtaoDGiFS/exec"
    title="CoreTrack"
    allow="clipboard-read; clipboard-write"
    allowfullscreen>
  </iframe>
</body>
</html>
